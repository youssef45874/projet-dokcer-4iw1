services:
  frontend:
    image: ecommerce/frontend:prod
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: production
      VITE_AUTH_SERVICE_URL: http://auth-service:3001
      VITE_PRODUCT_SERVICE_URL: http://product-service:3000
      VITE_ORDER_SERVICE_URL: http://order-service:3002
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  auth-service:
    image: ecommerce/auth-service:prod
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://auth-db:27017/auth
      NODE_ENV: production
    command: >
      sh -c "export JWT_SECRET=$$(cat /run/secrets/jwt_secret) && npm start"
    secrets:
      - jwt_secret
    depends_on:
      auth-db:
        condition: service_started
    networks:
      - app-network
      - db-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  product-service:
    image: ecommerce/product-service:prod
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://product-db:27017/ecommerce
      NODE_ENV: production
    depends_on:
      product-db:
        condition: service_started
    networks:
      - app-network
      - db-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  order-service:
    image: ecommerce/order-service:prod
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://order-db:27017/orders
      NODE_ENV: production
      VITE_PRODUCT_SERVICE_URL: http://product-service:3000
    command: >
      sh -c "export JWT_SECRET=$$(cat /run/secrets/jwt_secret) && npm start"
    secrets:
      - jwt_secret
    depends_on:
      order-db:
        condition: service_started
      product-service:
        condition: service_healthy
    networks:
      - app-network
      - db-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  auth-db:
    image: mongo:6-jammy
    volumes:
      - auth-data:/data/db
    networks:
      - db-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  product-db:
    image: mongo:6-jammy
    volumes:
      - product-data:/data/db
    networks:
      - db-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  order-db:
    image: mongo:6-jammy
    volumes:
      - order-data:/data/db
    networks:
      - db-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app-network:
    driver: bridge
  db-network:
    driver: bridge

volumes:
  auth-data:
  product-data:
  order-data:

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret.txt